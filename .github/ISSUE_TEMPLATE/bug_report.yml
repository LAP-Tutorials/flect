name: Bug report
description: Report something that is broken in Flect
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Start Flect with `npm start`
        2. Pair device...
        3. Click Start Mirroring...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Windows version
      placeholder: e.g. Windows 11 23H2
    validations:
      required: true

  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: Output of `node -v`
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Android device
      placeholder: e.g. Samsung Galaxy A72, Android 14
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Console logs
      description: Paste relevant output from the Flect log panel or terminal.
      render: shell
